<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>誕生日お祝い演出プレビュー</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Mochiy+Pop+One&display=swap" rel="stylesheet">
<style>
  :root{--pink:#e0218a;--gold:#f5c542;}
  *{box-sizing:border-box}
  body{margin:0;background:#0f1115;color:#e8edf5;font-family:-apple-system,"Segoe UI","Hiragino Kaku Gothic ProN",Meiryo,sans-serif;display:flex;flex-direction:column;align-items:center;gap:14px;padding:22px}
  h1{font-size:16px;margin:2px 0;color:#aeb8c7;font-weight:600}
  .stage{position:relative;width:min(90vw,480px);height:min(90vw,480px);max-height:520px;background:radial-gradient(circle at 50% 38%,#3a1530,#141019 70%);border:1px solid #2b3240;border-radius:20px;overflow:hidden;box-shadow:0 16px 56px rgba(0,0,0,.55)}

  /* 旗（順番にボンッと登場→揺れる） */
  .bunting{position:absolute;top:24%;left:0;width:100%;height:62px;display:flex;justify-content:space-around;align-items:flex-start;padding:0 6px;z-index:2}
  .rope{position:absolute;top:-2px;left:0;width:100%;height:26px;z-index:1;pointer-events:none;animation:ropeIn 1s cubic-bezier(.22,1.5,.4,1) both}
  @keyframes ropeIn{0%{transform:translateY(-48px);opacity:0}70%{transform:translateY(5px);opacity:1}100%{transform:translateY(0)}}
  .flag-wrap{display:inline-block;position:relative;z-index:2;margin-top:6px;transform-origin:top center;animation:flagIn .7s cubic-bezier(.22,1.6,.36,1) both}
  .flag{display:block;width:0;height:0;border-left:13px solid transparent;border-right:13px solid transparent;border-top:24px solid var(--c);transform-origin:top center;animation:wave 2.6s linear infinite;filter:drop-shadow(0 2px 2px rgba(0,0,0,.25))}
  @keyframes flagIn{0%{transform:translateY(-30px) scale(.2);opacity:0}70%{transform:translateY(4px) scale(1.12);opacity:1}100%{transform:translateY(0) scale(1);opacity:1}}
  @keyframes wave{0%{transform:translateY(0) rotate(0)}25%{transform:translateY(5px) rotate(4deg)}50%{transform:translateY(0) rotate(0)}75%{transform:translateY(-5px) rotate(-4deg)}100%{transform:translateY(0) rotate(0)}}

  /* 風船 */
  .balloon{position:absolute;bottom:-80px;width:46px;height:58px;border-radius:50% 50% 48% 48%;opacity:.95;animation:floatUp linear infinite;z-index:1}
  .balloon::after{content:"";position:absolute;bottom:-7px;left:50%;width:2px;height:34px;background:rgba(255,255,255,.4);transform:translateX(-50%)}
  .balloon::before{content:"";position:absolute;top:9px;left:11px;width:13px;height:17px;background:rgba(255,255,255,.35);border-radius:50%}
  @keyframes floatUp{0%{transform:translateY(0) translateX(0)}50%{transform:translateY(-300px) translateX(14px)}100%{transform:translateY(-560px) translateX(-6px);opacity:0}}

  /* ケーキ */
  .cake-wrap{position:absolute;left:50%;bottom:74px;transform:translateX(-50%);animation:cakeIn 1.5s .75s cubic-bezier(.34,1.56,.64,1) both;z-index:3}
  @keyframes cakeIn{0%{transform:translateX(-50%) scale(.08);opacity:0}50%{transform:translateX(-50%) scale(1.2);opacity:1}68%{transform:translateX(-50%) scale(.9)}82%{transform:translateX(-50%) scale(1.07)}92%{transform:translateX(-50%) scale(.97)}100%{transform:translateX(-50%) scale(1)}}
  .flame{transform-origin:center bottom;animation:flick .25s ease-in-out infinite alternate}
  @keyframes flick{0%{transform:scale(1) translateY(0);opacity:1}100%{transform:scale(.82,1.08) translateY(-1px);opacity:.85}}

  /* 紙吹雪 */
  .confetti{position:absolute;top:-14px;width:9px;height:14px;opacity:.95;animation:fall linear infinite;z-index:4}
  @keyframes fall{0%{transform:translateY(-20px) rotate(0)}100%{transform:translateY(560px) rotate(560deg)}}

  /* メッセージ */
  .msg{position:absolute;left:0;right:0;bottom:16px;text-align:center;z-index:5}
  .hb{font-family:'Pacifico',cursive;font-size:34px;line-height:1;color:var(--gold);text-shadow:0 3px 0 #b9821f,0 4px 14px rgba(245,197,66,.5)}
  .hb .letter{display:inline-block;animation:letterPop .7s cubic-bezier(.22,1.7,.36,1) both}
  @keyframes letterPop{0%{transform:scale(0) translateY(14px);opacity:0}60%{transform:scale(1.3) translateY(-5px);opacity:1}100%{transform:scale(1) translateY(0)}}
  .nm{font-family:'Mochiy Pop One',sans-serif;font-size:22px;margin-top:8px;text-shadow:0 2px 10px rgba(224,33,138,.55);animation:popName .8s 1.9s cubic-bezier(.22,1.6,.36,1) both}
  .nm small{font-size:13px;color:#f3a4c8}
  @keyframes popName{0%{transform:scale(.3);opacity:0}70%{transform:scale(1.12)}100%{transform:scale(1);opacity:1}}

  .row{display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
  button{background:var(--pink);color:#fff;border:0;border-radius:9px;padding:9px 16px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit}
  button.alt{background:transparent;border:1px solid #2b3240;color:#aeb8c7}
  .note{font-size:12px;color:#7a8696;max-width:480px;text-align:center;line-height:1.6}
</style>
</head>
<body>
  <h1>🎂 誕生日お祝い演出（自前・外部依存なし）</h1>
  <div class="stage" id="stage">
    <div class="bunting" id="bunting"></div>
    <div class="cake-wrap">
      <svg width="150" height="150" viewBox="0 0 150 150">
        <g>
          <ellipse class="flame" cx="55" cy="34" rx="4" ry="8" fill="#ffcf4d"/>
          <ellipse class="flame" cx="75" cy="30" rx="4" ry="8" fill="#ffcf4d" style="animation-delay:.1s"/>
          <ellipse class="flame" cx="95" cy="34" rx="4" ry="8" fill="#ffcf4d" style="animation-delay:.18s"/>
        </g>
        <rect x="53" y="42" width="4" height="20" fill="#7fd1ff"/>
        <rect x="73" y="38" width="4" height="24" fill="#ff9ec7"/>
        <rect x="93" y="42" width="4" height="20" fill="#b6f5a0"/>
        <rect x="40" y="62" width="70" height="26" rx="6" fill="#ffe1ef"/>
        <path d="M40 70 q9 10 18 0 q9 10 18 0 q9 10 18 0 q9 10 16 0 v-8 H40z" fill="#fff"/>
        <rect x="28" y="88" width="94" height="34" rx="8" fill="#ffd1e8"/>
        <path d="M28 96 q11 11 22 0 q11 11 22 0 q11 11 22 0 q11 11 22 0 q4 4 6 0 v-8 H28z" fill="#fff5fb"/>
        <circle cx="44" cy="106" r="3" fill="#e0218a"/><circle cx="64" cy="110" r="3" fill="#f5c542"/>
        <circle cx="84" cy="106" r="3" fill="#7fd1ff"/><circle cx="104" cy="110" r="3" fill="#b6f5a0"/>
        <ellipse cx="75" cy="124" rx="60" ry="7" fill="rgba(255,255,255,.18)"/>
      </svg>
    </div>
    <div class="msg"><div class="hb" id="hb"></div><div class="nm" id="nm">小林 <small>さん おめでとう！</small></div></div>
  </div>
  <div class="row">
    <button onclick="celebrate()">🎊 もう一回</button>
    <button class="alt" onclick="toggleBalloons()">🎈 風船 ON/OFF</button>
  </div>
  <div class="note">旗が順番にボンッと登場→揺れる／「Happy Birthday」はPacificoで1文字ずつボンボン弾けて出ます。外部画像・JSライブラリ無し（フォントだけGoogle Fonts）。</div>

<script>
  var COLORS=['#e0218a','#f5c542','#7fd1ff','#b6f5a0','#ff9ec7','#a78bfa'];
  var ROPE_VALS='M 0 8.0 L 2 8.56 L 4 9.1 L 6 9.6 L 8 10.05 L 10 10.42 L 12 10.71 L 14 10.9 L 16 10.99 L 18 10.98 L 20 10.86 L 22 10.64 L 24 10.32 L 26 9.93 L 28 9.46 L 30 8.95 L 32 8.4 L 34 7.84 L 36 7.28 L 38 6.75 L 40 6.26 L 42 5.83 L 44 5.48 L 46 5.22 L 48 5.06 L 50 5.0 L 52 5.05 L 54 5.2 L 56 5.44 L 58 5.78 L 60 6.2 L 62 6.68 L 64 7.21 L 66 7.76 L 68 8.33 L 70 8.88 L 72 9.4 L 74 9.87 L 76 10.28 L 78 10.6 L 80 10.83 L 82 10.97 L 84 11.0 L 86 10.92 L 88 10.74 L 90 10.47 L 92 10.1 L 94 9.67 L 96 9.17 L 98 8.63 L 100 8.07;M 0 10.6 L 2 10.27 L 4 9.87 L 6 9.39 L 8 8.87 L 10 8.32 L 12 7.76 L 14 7.2 L 16 6.68 L 18 6.2 L 20 5.78 L 22 5.44 L 24 5.19 L 26 5.05 L 28 5.0 L 30 5.06 L 32 5.23 L 34 5.49 L 36 5.84 L 38 6.26 L 40 6.75 L 42 7.28 L 44 7.84 L 46 8.4 L 48 8.95 L 50 9.47 L 52 9.93 L 54 10.33 L 56 10.64 L 58 10.86 L 60 10.98 L 62 10.99 L 64 10.9 L 66 10.71 L 68 10.42 L 70 10.05 L 72 9.6 L 74 9.1 L 76 8.56 L 78 8.0 L 80 7.43 L 82 6.89 L 84 6.39 L 86 5.95 L 88 5.57 L 90 5.29 L 92 5.1 L 94 5.01 L 96 5.02 L 98 5.14 L 100 5.37;M 0 5.4 L 2 5.17 L 4 5.03 L 6 5.0 L 8 5.08 L 10 5.26 L 12 5.53 L 14 5.89 L 16 6.33 L 18 6.83 L 20 7.36 L 22 7.92 L 24 8.48 L 26 9.03 L 28 9.54 L 30 9.99 L 32 10.38 L 34 10.68 L 36 10.88 L 38 10.99 L 40 10.99 L 42 10.88 L 44 10.67 L 46 10.37 L 48 9.99 L 50 9.53 L 52 9.02 L 54 8.48 L 56 7.92 L 58 7.36 L 60 6.82 L 62 6.33 L 64 5.89 L 66 5.53 L 68 5.25 L 70 5.08 L 72 5.0 L 74 5.03 L 76 5.17 L 78 5.4 L 80 5.73 L 82 6.14 L 84 6.61 L 86 7.13 L 88 7.68 L 90 8.25 L 92 8.8 L 94 9.33 L 96 9.81 L 98 10.22 L 100 10.56;M 0 8.0 L 2 8.56 L 4 9.1 L 6 9.6 L 8 10.05 L 10 10.42 L 12 10.71 L 14 10.9 L 16 10.99 L 18 10.98 L 20 10.86 L 22 10.64 L 24 10.32 L 26 9.93 L 28 9.46 L 30 8.95 L 32 8.4 L 34 7.84 L 36 7.28 L 38 6.75 L 40 6.26 L 42 5.83 L 44 5.48 L 46 5.22 L 48 5.06 L 50 5.0 L 52 5.05 L 54 5.2 L 56 5.44 L 58 5.78 L 60 6.2 L 62 6.68 L 64 7.21 L 66 7.76 L 68 8.33 L 70 8.88 L 72 9.4 L 74 9.87 L 76 10.28 L 78 10.6 L 80 10.83 L 82 10.97 L 84 11.0 L 86 10.92 L 88 10.74 L 90 10.47 L 92 10.1 L 94 9.67 L 96 9.17 L 98 8.63 L 100 8.07';
  function buildBunting(){
    var b=document.getElementById('bunting');
    var rope='<svg class="rope" viewBox="0 0 100 20" preserveAspectRatio="none"><path d="'+ROPE_VALS.split(';')[0]+'" fill="none" stroke="rgba(255,255,255,.5)" stroke-width="1.4" vector-effect="non-scaling-stroke"><animate attributeName="d" dur="2.6s" repeatCount="indefinite" values="'+ROPE_VALS+'"/></path></svg>';
    var h=rope;
    for(var i=0;i<11;i++){ var xi=4.55+i*9.09; var wd=-(0.0389*xi); h+='<span class="flag-wrap" style="animation-delay:'+(0.5+i*0.16).toFixed(2)+'s"><span class="flag" style="--c:'+COLORS[i%COLORS.length]+';animation-delay:'+wd.toFixed(3)+'s"></span></span>'; }
    b.innerHTML=h;
  }
  function buildText(){
    var el=document.getElementById('hb'); var txt='Happy Birthday'; var h='';
    for(var i=0;i<txt.length;i++){ var ch=txt[i]; if(ch===' '){ h+='<span style="display:inline-block;width:.32em"></span>'; continue; } h+='<span class="letter" style="animation-delay:'+(1.2+i*0.09).toFixed(2)+'s">'+ch+'</span>'; }
    el.innerHTML=h;
    var nm=document.getElementById('nm'); nm.style.animation='none'; void nm.offsetWidth; nm.style.animation='';
  }
  var balloonsOn=true;
  function spawnConfetti(n){ var st=document.getElementById('stage'); for(var i=0;i<n;i++){ (function(){ var c=document.createElement('div'); c.className='confetti'; c.style.left=(Math.random()*100)+'%'; c.style.background=COLORS[(Math.random()*COLORS.length)|0]; var dur=2.4+Math.random()*1.8; c.style.animationDuration=dur+'s'; c.style.animationDelay=(Math.random()*0.5)+'s'; if(Math.random()<.5)c.style.borderRadius='50%'; st.appendChild(c); setTimeout(function(){c.remove();},(dur+1)*1000); })(); } }
  function spawnBalloon(){ if(!balloonsOn)return; var st=document.getElementById('stage'); var b=document.createElement('div'); b.className='balloon'; b.style.left=(8+Math.random()*84)+'%'; b.style.background=COLORS[(Math.random()*COLORS.length)|0]; var dur=5+Math.random()*3; b.style.animationDuration=dur+'s'; st.appendChild(b); setTimeout(function(){b.remove();},dur*1000); }
  function restart(sel){ var el=document.querySelector(sel); if(!el)return; el.style.animation='none'; void el.offsetWidth; el.style.animation=''; }
  function celebrate(){ buildBunting(); restart('.cake-wrap'); buildText(); spawnConfetti(60); }
  function toggleBalloons(){ balloonsOn=!balloonsOn; }
  celebrate();
  setInterval(function(){ spawnConfetti(14); },1500);
  setInterval(spawnBalloon,1100);
</script>
</body>
</html>
